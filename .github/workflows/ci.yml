name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-core.txt

      - name: Run tests
        run: python -m pytest tests/ aneos_core/tests/ -m "not network" -v --tb=short --cov=aneos_core --cov-report=term-missing --cov-fail-under=40

      - name: Verify OpenAPI spec is up to date
        run: |
          make spec
          if ! git diff --exit-code docs/api/openapi.json; then
            echo ""
            echo "ERROR: docs/api/openapi.json is out of date."
            echo "Run 'make spec' locally and commit the updated file."
            exit 1
          fi

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap (certs + init.sql)
        run: make bootstrap

      - name: Build Docker images
        run: docker-compose build
